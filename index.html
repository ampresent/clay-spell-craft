<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clay Spell Craft — 泥灵界</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loading-content">
      <div class="clay-loader">
        <div class="clay-blob"></div>
        <div class="clay-blob"></div>
        <div class="clay-blob"></div>
      </div>
      <h1>泥灵界</h1>
      <p>Clayrealm</p>
      <div id="loading-story" class="loading-story"></div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="hud" style="display:none;">
    <div id="hud-top">
      <div id="player-info">
        <span class="icon">🧙</span>
        <span id="player-name">塑灵师</span>
        <span id="time-display" style="margin-left:12px;color:#6a5a4a;font-size:0.78rem;font-weight:400;"></span>
      </div>
      <div id="compass">
        <canvas id="compass-canvas" width="200" height="30"></canvas>
      </div>
      <div id="mana-bar">
        <span class="icon">✨</span>
        <div class="bar"><div class="bar-fill" id="mana-fill"></div></div>
        <span id="mana-text">0</span>
      </div>
    </div>

    <div id="hud-bottom">
      <div id="toolbar">
        <div class="tool-slot active" data-tool="sculpt" title="捏塑 (1)">
          <span class="tool-icon">🤲</span>
          <span class="tool-name">捏塑</span>
        </div>
        <div class="tool-slot" data-tool="fire" title="火焰魔法 (2)">
          <span class="tool-icon">🔥</span>
          <span class="tool-name">火焰</span>
        </div>
        <div class="tool-slot" data-tool="water" title="水流魔法 (3)">
          <span class="tool-icon">💧</span>
          <span class="tool-name">水流</span>
        </div>
        <div class="tool-slot" data-tool="wind" title="风暴魔法 (4)">
          <span class="tool-icon">🌪️</span>
          <span class="tool-name">风暴</span>
        </div>
        <div class="tool-slot" data-tool="life" title="生命魔法 (5)">
          <span class="tool-icon">🌿</span>
          <span class="tool-name">生命</span>
        </div>
      </div>
    </div>

    <div class="crosshair"></div>

    <div id="dialog-box" style="display:none;">
      <div class="dialog-portrait" id="dialog-portrait"></div>
      <div class="dialog-content">
        <div class="dialog-name" id="dialog-name"></div>
        <div class="dialog-text" id="dialog-text"></div>
      </div>
      <div class="dialog-continue">SPACE ▶</div>
    </div>

    <div id="craft-panel" style="display:none;">
      <h2>🧪 黏土工坊</h2>
      <div id="craft-slots">
        <div class="craft-slot" id="craft-clay" data-slot="clay">
          <span class="slot-label">黏土</span>
        </div>
        <div class="craft-plus">+</div>
        <div class="craft-slot" id="craft-spell" data-slot="spell">
          <span class="slot-label">魔法</span>
        </div>
        <div class="craft-equals">＝</div>
        <div class="craft-slot craft-result" id="craft-result">
          <span class="slot-label">助手</span>
        </div>
      </div>
      <button id="craft-btn" disabled>注入魔法 ✨</button>
      <button id="craft-close">关闭</button>
    </div>

    <div id="minimap">
      <canvas id="minimap-canvas" width="150" height="150"></canvas>
    </div>

    <div id="quest-tracker">
      <h3>📋 进行中</h3>
      <div id="tracker-content"></div>
    </div>

    <div id="quest-panel" style="display:none;">
      <h2>📜 任务日志</h2>
      <div id="quest-list"></div>
      <button id="quest-close" onclick="document.getElementById('quest-panel').style.display='none'">关闭</button>
    </div>

    <div id="inventory-panel" style="display:none;">
      <h2>🎒 背包</h2>
      <div id="inventory-grid"></div>
      <button id="inv-close" onclick="document.getElementById('inventory-panel').style.display='none'">关闭</button>
    </div>

    <div id="abilities-panel" style="display:none;">
      <h2>⚡ 技能</h2>
      <div id="abilities-grid"></div>
      <button id="abil-close" onclick="document.getElementById('abilities-panel').style.display='none'">关闭</button>
    </div>
  </div>

  <div id="title-screen">
    <canvas id="title-bg-canvas"></canvas>
    <div class="title-content">
      <h1 class="game-title">泥灵界</h1>
      <p class="game-subtitle">Clayrealm</p>
      <div class="title-divider"></div>
      <p class="game-tagline">捏一团黏土，注入一缕魔法，创造你的助手</p>
      <div class="title-buttons">
        <button id="start-btn">踏入泥灵界 🌍</button>
        <button id="load-btn" style="display:none;">继续冒险 📂</button>
      </div>
      <div class="title-footer">
        <span>WASD</span> 移动 · <span>鼠标</span> 视角 · <span>左键</span> 施法 · <span>E</span> 交互<br>
        <span>Q</span> 任务 · <span>I</span> 背包 · <span>R</span> 技能 · <span>Tab</span> 工坊 · <span>F5</span> 存档
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/particles-bg.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/world.js"></script>
  <script src="js/structures.js"></script>
  <script src="js/water.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/landmarks.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/abilities.js"></script>
  <script src="js/clay.js"></script>
  <script src="js/spell.js"></script>
  <script src="js/character.js"></script>
  <script src="js/quest.js"></script>
  <script src="js/daynight.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/save.js"></script>
  <script src="js/tooltip.js"></script>
  <script src="js/minimap.js"></script>
  <script src="js/compass.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/interact-prompt.js"></script>
  <script src="js/screenfx.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
